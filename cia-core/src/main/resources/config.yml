lang: "zh_cn"

disabled-jobs: [ ]

lobbies:
  hub:
    location: [ 0, 100, 0 ]
    range:
      from: [ 100, 100 ]
      to: [ -100, -100 ]
    entry:
      time: 3000 # ms
      from: [ 9, 103, 1 ]
      to: [ 11, 100, -1 ]

  death:
    location: [ -500, 100, -500 ]
    range:
      from: [ -600, -600 ]
      to: [ -400, -400 ]

game:
  disabled-modes: [ ]

  # Shared game-level settings owned by core.
  leave-delay-seconds: 5

  abilities:
    core:
      resting-regeneration:
        enabled: false
        default-active: false
      mutation:
        enabled: false
        default-active: false
      death-messages:
        enabled: true
        default-active: true
      death-stats:
        enabled: true
        default-active: true
      kill-streak:
        enabled: true
        default-active: true
      death-cleanup-participants:
        enabled: true
        default-active: true
      respawn-countdown:
        enabled: true
        default-active: true
        settings:
          disabled-fallback: IMMEDIATE_RESPAWN
      skill-runtime:
        enabled: true
        default-active: true
      skill-hotbar:
        enabled: true
        default-active: true
      skill-cooldown:
        enabled: true
        default-active: true
      currency:
        enabled: true
        default-active: true
      store-ui:
        enabled: true
        default-active: true
      cosmetic-runtime:
        enabled: true
        default-active: true

ui:
  lobby:
    job-select-mode: hotbar
    jobs-per-page: 5

world:
  portals-enabled: false
