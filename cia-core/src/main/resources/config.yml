lang: "zh_cn"

disabled-jobs: [ ]

database:
  # Supported values: sqlite, h2, mysql, postgresql.
  type: sqlite
  table-prefix: cia_

  sqlite:
    file: database/creepersiarena.db
    pool-size: 1
    busy-timeout-ms: 5000
    journal-mode: WAL
    synchronous: NORMAL

  h2:
    file: database/creepersiarena
    username: sa
    password: ""
    pool-size: 2

  mysql:
    host: localhost
    port: 3306
    database: creepersiarena
    username: creepersiarena
    password: ""
    pool-size: 10
    connection-timeout-ms: 5000
    parameters:
      useUnicode: true
      useSSL: false
      allowPublicKeyRetrieval: true
      characterEncoding: utf8
      serverTimezone: UTC

  postgresql:
    host: localhost
    port: 5432
    database: creepersiarena
    username: creepersiarena
    password: ""
    pool-size: 10
    connection-timeout-ms: 5000
    parameters:
      ssl: false

  migrations:
    validate-checksum: true
    fail-on-error: true

  executor:
    threads: 2
    queue-size: 10000

lobbies:
  hub:
    location: [ 0, 100, 0 ]
    range:
      from: [ 100, 100 ]
      to: [ -100, -100 ]
    entry:
      time: 3000 # ms
      from: [ 9, 103, 1 ]
      to: [ 11, 100, -1 ]

  death:
    location: [ -500, 100, -500 ]
    range:
      from: [ -600, -600 ]
      to: [ -400, -400 ]

game:
  disabled-modes: [ ]

  # Shared game-level settings owned by core.
  leave-delay-seconds: 5

  abilities:
    core:
      resting_regeneration:
        enabled: false
        default-active: false
      mutation:
        enabled: false
        default-active: false
      death_messages:
        enabled: true
        default-active: true
      death_stats:
        enabled: true
        default-active: true
      kill_streak:
        enabled: true
        default-active: true
      death_cleanup_participants:
        enabled: true
        default-active: true
      respawn_countdown:
        enabled: true
        default-active: true
        settings:
          disabled-fallback: IMMEDIATE_RESPAWN
      skill_runtime:
        enabled: true
        default-active: true
      skill_hotbar:
        enabled: true
        default-active: true
      skill_cooldown:
        enabled: true
        default-active: true
      currency:
        enabled: true
        default-active: true
      store_ui:
        enabled: true
        default-active: true
      cosmetic_runtime:
        enabled: true
        default-active: true

ui:
  lobby:
    job-select-mode: hotbar
    jobs-per-page: 5

world:
  portals-enabled: false
